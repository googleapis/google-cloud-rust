# Configuration for Gemini Code Assist on GitHub.
# See https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github.
have_fun: false
memory_config:
  disabled: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    # This is spammy, it repeats things we already know.
    summary: false
    code_review: true
    include_drafts: true
