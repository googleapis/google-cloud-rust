# The CI builds exclude these explicitly. Having them here makes it easier to
# format everything we care about. 
#
# ```
# taplo format .
# ```
#
exclude = ['generator/testdata/**']

[formatting]
align_entries  = true
column_width   = 120
reorder_arrays = true

# Prevent Taplo from alphabetizing arrays under the [alias] table. Long CLI
# commands are split across multiple lines for readability, and because
# command-line flags are order-dependent, sorting them would break the command.
[[rule]]
keys = ["alias"]
[rule.formatting]
reorder_arrays = false
